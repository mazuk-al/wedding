<script type="text/babel">
function App() {
  const accents = { kk: "#B05E3B", ru: "#2E4A7A", en: "#7A2E2E" };
  return (
    <Invitation
      variant="A"
      density={0.5}
      accentOverrides={accents}
      initialLang="ru"
    />
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
