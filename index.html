<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Александр & Адина — Приглашение на свадьбу</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body { height: 100%; background: #e9e3d4; }
  body { margin: 0; font-family: "Inter", system-ui, sans-serif; }

  /* Canvas wrapper */
  #root { width: 100%; height: 100%; }

  /* The artboard wraps an .invitation; we let it scroll inside the artboard frame */
  .ab-frame {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg, #F5EFE4);
    scrollbar-width: thin;
  }
  .ab-frame::-webkit-scrollbar { width: 6px; }
  .ab-frame::-webkit-scrollbar-thumb { background: #C8BAA0; border-radius: 3px;}

  .ab-frame .invitation .topbar { position: sticky; top: 0;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="patterns.jsx"></script>
<script type="text/babel" src="invitation.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": 0.5,
  "accentKk": "#B05E3B",
  "accentRu": "#2E4A7A",
  "accentEn": "#7A2E2E"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const accents = {
    kk: t.accentKk,
    ru: t.accentRu,
    en: t.accentEn
  };

  return (
    <>
      <DesignCanvas>
        <DCSection id="invites" title="Приглашение · Александр & Адина" subtitle="2 варианта · переключатель KZ / RU / EN в шапке">
          <DCArtboard id="variant-a" label="A · Классический" width={460} height={820}>
            <div className="ab-frame" data-screen-label="Variant A">
              <Invitation
                variant="A"
                density={t.density}
                accentOverrides={accents}
                initialLang="ru"
              />
            </div>
          </DCArtboard>

          <DCArtboard id="variant-b" label="B · Редакционный" width={460} height={820}>
            <div className="ab-frame" data-screen-label="Variant B">
              <Invitation
                variant="B"
                density={t.density}
                accentOverrides={accents}
                initialLang="kk"
              />
            </div>
          </DCArtboard>

          <DCArtboard id="variant-a-en" label="A · English start" width={460} height={820}>
            <div className="ab-frame" data-screen-label="Variant A (EN)">
              <Invitation
                variant="A"
                density={t.density}
                accentOverrides={accents}
                initialLang="en"
              />
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="notes" title="Заметки и логика" subtitle="">
          <DCPostIt width={260}>
            <strong>Узоры hero</strong><br/>
            KZ — шанырак (тундык) и рога барана.<br/>
            RU — звезда Алатырь и мезенский конь.<br/>
            EN — советский ковёр с медальоном и бахромой.<br/><br/>
            Меняются автоматически при смене языка в шапке.
          </DCPostIt>
          <DCPostIt width={260}>
            <strong>Что покрутить</strong><br/>
            Откройте панель Tweaks справа внизу — плотность узора и акцентный цвет для каждого языка.<br/><br/>
            Каждый артборд можно открыть на весь экран — стрелка в правом нижнем углу.
          </DCPostIt>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Узор" />
        <TweakSlider
          label="Плотность"
          value={t.density}
          min={0.5} max={1.8} step={0.05}
          unit="×"
          onChange={(v)=>setTweak("density", v)}
        />
        <TweakSection label="Акценты по языку" />
        <TweakColor label="KZ" value={t.accentKk} onChange={(v)=>setTweak("accentKk", v)} />
        <TweakColor label="RU" value={t.accentRu} onChange={(v)=>setTweak("accentRu", v)} />
        <TweakColor label="EN" value={t.accentEn} onChange={(v)=>setTweak("accentEn", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
